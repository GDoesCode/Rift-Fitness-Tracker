name: Desktop App Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers when pushing tags like v1.0.0

jobs:
  build-and-release:
    name: Build Windows Executable
    runs-on: windows-latest  # Runs on a Windows VM so PyInstaller produces a Windows .exe

    permissions:
      contents: write  # Grants permission to upload files to GitHub Releases

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          # Replace 'src/main.py' with your main application entry script
          pyinstaller .\rift_fitness_tracker.spec

      - name: Zip the Output Directory
        shell: powershell
        run: |
          Compress-Archive -Path "dist" -DestinationPath "dist/Rift-Fitness-Tracker-Windows.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MyApp-Windows.zip
          generate_release_notes: true
          prerelease: true