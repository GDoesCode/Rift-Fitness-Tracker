name: Desktop App Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build Windows Executable
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller and Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
              pip install -r requirements.txt
          }

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --noconfirm rift_fitness_tracker.spec

      - name: Zip Executable Output
        shell: powershell
        run: |
          # Zips the generated .exe from dist/ into the root folder
          Compress-Archive -Path "dist/RiftFitnessTracker.exe" -DestinationPath "RiftFitnessTracker-Windows.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RiftFitnessTracker-Windows.zip
            dist/RiftFitnessTracker.exe
          fail_on_unmatched_files: true
          generate_release_notes: true