name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers when pushing tags like v0.1.0, v1.0.0

jobs:
  build-and-publish:
    name: Build package and publish to PyPI
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Critical for PyPI Trusted Publishing (OIDC authentication)
      contents: write  # Critical for creating GitHub Releases and uploading assets

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build Source Distribution and Wheel into dist/
        run: python -m build

      - name: Publish Package to PyPI
        uses: pypa/gh-action-pypa-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true